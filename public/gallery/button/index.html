<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery Button</title>
    <link rel="stylesheet" href="/gallery/styles.css" />
  </head>
  <body>
    <div class="g-shell">
      <header class="g-header is-component">
        <a href="/gallery" class="g-back" aria-label="返回">‹</a>
        <div class="g-title">Button 按钮</div>
        <button id="switch" class="g-switch">1 / 2</button>
        <div id="menu" class="g-demo-menu" style="display: none">
          <button data-index="0">Demo1</button>
          <button data-index="1">Demo2</button>
        </div>
      </header>
      <main class="g-iframe-wrap">
        <iframe id="frame" class="g-iframe" src="/~demos/button-demo-basic"></iframe>
      </main>
    </div>

    <script>
      const demos = ['/~demos/button-demo-basic', '/~demos/button-demo-rounded'];
      let activeIndex = 0;
      const frame = document.getElementById('frame');
      const switchBtn = document.getElementById('switch');
      const menu = document.getElementById('menu');

      function syncHeader() {
        switchBtn.textContent = `${activeIndex + 1} / ${demos.length}`;
      }

      function changeDemo(index) {
        activeIndex = index;
        frame.src = demos[activeIndex];
        syncHeader();
      }

      switchBtn.addEventListener('click', () => {
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
      });

      menu.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-index]');
        if (!btn) return;
        const next = Number(btn.dataset.index);
        changeDemo(next);
        menu.style.display = 'none';
      });

      document.addEventListener('click', (e) => {
        if (!menu.contains(e.target) && e.target !== switchBtn) {
          menu.style.display = 'none';
        }
      });
    </script>
  </body>
</html>
